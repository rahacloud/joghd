# Joghd Configuration Example
# Copy this file to config.toml and customize as needed
#
# Configuration loading order (later overrides earlier):
# 1. Default values (built-in)
# 2. This config file
# 3. Environment variables (JOGHD_ prefix)

[app]
# Run mode: "oneshot" (check once and exit) or "continuous" (persistent monitoring)
mode = "continuous"
# Log level: debug, info, warn, error
log_level = "info"
# Maximum concurrent health checks
concurrency = 10

[http]
# Default request timeout
timeout = "10s"
# User-Agent header for requests
user_agent = "Joghd/1.0"
# Skip TLS certificate verification (for self-signed certs)
skip_tls_verification = false

[retry]
# Maximum retry attempts before declaring failure
max_attempts = 3
# Initial wait time between retries
initial_wait = "1s"
# Maximum wait time between retries
max_wait = "10s"
# Multiplier for exponential backoff
multiplier = 2.0

# Alerter instances are declared under [alerters.<name>]. The table key
# becomes the instance name used in logs. You can declare multiple
# instances of the same type (e.g. one Telegram channel per company).
#
# Each instance supports an optional `companies` allow-list. An empty or
# missing list makes the instance a catch-all that receives every alert.
# A non-empty list restricts the instance to targets whose `company`
# matches. Catch-all instances still receive company-matched alerts.

[alerters.raha_io]
type = "telegram"
enabled = true
# Telegram Bot API token (can be overridden via JOGHD_ALERTERS__RAHA_IO__BOT_TOKEN)
bot_token = "123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11"
# Telegram Chat ID (can be overridden via JOGHD_ALERTERS__RAHA_IO__CHAT_ID)
chat_id = "-1001234567890"
timeout = "10s"
# No `companies` → catch-all, receives every alert.

[alerters.acme_corp]
type = "telegram"
enabled = false
bot_token = "123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11"
chat_id = "-1009876543210"
timeout = "10s"
# Only receives alerts whose target.company is "Acme Corp".
companies = ["Acme Corp"]

[alerters.team_mattermost]
type = "mattermost"
enabled = false
# Incoming webhook URL from Mattermost (can be overridden via
# JOGHD_ALERTERS__TEAM_MATTERMOST__WEBHOOK_URL)
webhook_url = "https://mattermost.example.com/hooks/xxxxxxxxxxxxxxxxxxxxxxxxxx"
# Optional overrides for the default webhook settings:
# channel = "#alerts"
# username = "Joghd"
# icon_url = "https://example.com/owl.png"
timeout = "10s"

# Define targets to monitor
# Each target is defined as [[targets]]

[[targets]]
name = "Example API Health"
url = "https://httpstat.us/200"
expected_status = 200
method = "GET"
# Check interval (for continuous mode)
interval = "30s"
# Optional: per-target timeout override
# timeout = "5s"
# Optional: company name shown in alert footer
# company = "Acme Corp"
# Optional: contact point shown in alert footer
# contact = "@oncall-team"

[[targets]]
name = "Example API with Headers"
url = "https://httpstat.us/200"
expected_status = 200
method = "GET"
interval = "1m"
company = "Acme Corp"
contact = "@oncall-team"
[targets.headers]
Authorization = "Bearer your-token-here"
X-Custom-Header = "custom-value"
