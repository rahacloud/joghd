version: 2

project_name: joghd

before:
  hooks:
    - go mod tidy

builds:
  - id: joghd
    main: ./cmd/joghd
    binary: joghd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - configs/config.example.toml

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

nfpms:
  - id: packages
    package_name: joghd
    vendor: rahacloud
    homepage: https://github.com/rahacloud/joghd
    maintainer: Parham Alvani <parham.alvani@gmail.com>
    description: URL health check service with Telegram alerts
    license: GPL-3.0
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    contents:
      - src: configs/config.example.toml
        dst: /etc/joghd/config.example.toml
        type: config
    scripts:
      postinstall: scripts/postinstall.sh

dockers:
  - id: joghd-amd64
    image_templates:
      - "ghcr.io/rahacloud/joghd:{{ .Version }}-amd64"
      - "ghcr.io/rahacloud/joghd:latest-amd64"
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/rahacloud/joghd"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.licenses=GPL-3.0"
    extra_files:
      - configs/config.example.toml
  - id: joghd-arm64
    image_templates:
      - "ghcr.io/rahacloud/joghd:{{ .Version }}-arm64"
      - "ghcr.io/rahacloud/joghd:latest-arm64"
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/rahacloud/joghd"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.licenses=GPL-3.0"
    extra_files:
      - configs/config.example.toml

docker_manifests:
  - name_template: "ghcr.io/rahacloud/joghd:{{ .Version }}"
    image_templates:
      - "ghcr.io/rahacloud/joghd:{{ .Version }}-amd64"
      - "ghcr.io/rahacloud/joghd:{{ .Version }}-arm64"
  - name_template: "ghcr.io/rahacloud/joghd:latest"
    image_templates:
      - "ghcr.io/rahacloud/joghd:latest-amd64"
      - "ghcr.io/rahacloud/joghd:latest-arm64"

release:
  github:
    owner: rahacloud
    name: joghd
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
